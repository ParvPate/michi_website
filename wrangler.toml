# Cloudflare Pages project config. Read by `wrangler pages deploy`
# for local CLI deploys + by the Pages build pipeline to confirm the
# asset directory + function routing.
#
# Dashboard settings still win — this file mirrors them so a fresh
# `npx wrangler pages deploy` from cwd Just Works without flag soup.
#
# Functions live at `functions/` (project root, NOT inside the asset
# dir). Wrangler auto-discovers them. _routes.json inside `pages_build_output_dir`
# narrows function invocation to /e/* and /u/*.

name = "michi-website"
compatibility_date = "2025-07-15"
pages_build_output_dir = ".output/public"
